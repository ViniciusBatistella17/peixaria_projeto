<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banca da feira Machado</title>
    <link rel="icon" type="image/x-icon" href="/img/logobanca.png">
    <link rel="stylesheet" href="css/contato.css">
</head>
<body>
    <h2>Banca da feira Machado - Contato</h2>
    <p>Dúvidas, sugestões ou encomendas especiais? Manda pra gente!</p>
    <form action="/enviar-contato" method="post">
        <!--1. INPUT TEXT-->
    <LABEL FOR=´´nome´´>Seu nome:</LABEL></br>
    <input type="email" id="email" name="email" placeholder="Nome completo" required><br><br>
    <!--2. INPUT EMAIL -->
    <label for="email">E-mail para retorno:</label><br>
    <input type="email" name="email" placeholder="seu@email.com" required><br><br>
    <!--3. INPUT TEL-->
    <label for="whatsapp">Whatsapp:</label><br>
    <input type="tel" id="whatsapp" placeholder="(19) 9999-9999" readonly><br><br>
    <!--4. Select -->
    <label for="assunto">Assunto:</label><br>
    <select id="assunto" name="assunto" required>
        <option value=""Selecione o motivo do contato></option>
        <option value="duvida">Duvidas sobre produtos</option>
        <option value="encomenda">encomenda especial</option>
        <option value="reclamacao">reclamacao</option>
        <option value="elogio">elogio</option>
        <option value="fornecedor">Quero ser fornecedor</option></select><br><br>
        <!--5. INPUT RADIO -->
        <fieldset>
            <legend>Como prefere o retorno?</legend>
            <input type="radio" id="retorno_whats" name="retorno" value="whatsapp" required>
            <label for="retorno_whats">E-mail</label><br>

            <input type="radio" id="retono_email" name="retorno" value="email">
            <label for="retono_email">Whatsapp</label><br>

            <input type="radio" id="retorno_ligacao" name="retorno" value="ligacao">
            <label for="retorno_ligacao">ligacao</label>
        </fieldset><br>
        <!--6. INPUT CHECKBOX-->
        <input type="checkbox" id="novidade" name="novidade" value="sim">
        <label for="novidade">Quero receber ofertas de peixe fresco por e-mail</label><br><br>
        <!--7. TEXTAREA - bÔnus, não é input mas conta como campo -->
        <label for="mensagem">Mensagem:</label><br> 
        <textarea id="mensagem" rows="5" cols="40" placeholder="Escreva sua dúvida aqui..." requiredd></textarea><br><br>

<button type="submit">Enviar Mensagem</button>
    </form>
</body>
</html>
